<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>All CSS Concepts Demo</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <header class="header">
    <h1>CSS Concepts Demo</h1>
    <nav>
      <a href="#">Home</a>
      <a href="#">About</a>
    </nav>
  </header>

  <section class="box-model">
    <h2>Box Model</h2>
    <div class="box">Box</div>
  </section>

  <section class="flex-demo">
    <h2>Flexbox</h2>
    <div class="flex-container">
      <div>1</div>
      <div>2</div>
      <div>3</div>
    </div>
  </section>

  <section class="grid-demo">
    <h2>Grid</h2>
    <div class="grid-container">
      <div>A</div>
      <div>B</div>
      <div>C</div>
      <div>D</div>
    </div>
  </section>

  <section>
    <h2>Button + Hover + Transition</h2>
    <button class="btn">Hover Me</button>
  </section>

  <section>
    <h2>Animation</h2>
    <div class="circle"></div>
  </section>

  <footer>
    <p>Responsive Footer</p>
  </footer>

</body>
</html>
