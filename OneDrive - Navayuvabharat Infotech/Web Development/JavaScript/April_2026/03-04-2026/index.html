<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM List Manager</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        input, button {
            padding: 8px;
            margin: 5px;
        }

        .item {
            list-style: none;
            margin: 5px 0;
        }

        .edit {
            margin-left: 10px;
        }

        .delete {
            margin-left: 5px;
            color: red;
        }
    </style>
</head>
<body>

    <h2>Dynamic List Manager</h2>

    <!-- Input and Buttons -->
    <input type="text" id="inputBox" placeholder="Enter item">
    <button id="addBtn">Add</button>
    <button id="removeBtn">Remove Last</button>
    <button id="styleBtn">Style Items</button>

    <!-- Container -->
    <ul id="container"></ul>

    <!-- Link JavaScript -->
    <script src="script.js"></script>

</body>
</html>
